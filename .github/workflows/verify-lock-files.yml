name: Verify Lockfiles

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify-lockfiles:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Deps & Verify bun.lock
        uses: ./.github/actions/setup-deps
        with:
          working-directory: template

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code template/bun.lock || (
            echo "❌ Lockfiles in template/ changed after install. Run install locally and commit updates." && exit 1
          )
